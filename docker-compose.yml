services:
  db:
    image: postgres:16
    container_name: postgres-db-api-default
    environment:
      POSTGRES_DB: meu_projeto
      POSTGRES_USER: usuario
      POSTGRES_PASSWORD: senha_forte
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: